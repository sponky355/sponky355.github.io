<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Muro Comunitario</title>
<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

.hidden{
display:none;
}

.card{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

#feed{
margin-top:30px;
display:grid;
gap:20px;
}

.post{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.post img{
width:100%;
border-radius:8px;
}

</style>
</head>

<body>

<div id="auth">

<h2>Login</h2>

<input id="email" placeholder="correo">
<input id="password" type="password" placeholder="contraseña">

<button id="login">Entrar</button>
<button id="register">Registrar</button>

</div>


<div id="app" class="hidden">

<h3 id="user"></h3>

<input id="texto" placeholder="descripcion">
<input type="file" id="imagen">

<button id="subir">Publicar</button>

<div id="estado"></div>

<div id="feed"></div>

<button id="logout">Salir</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
getDocs,
orderBy,
Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";



const firebaseConfig = {

apiKey:"TU_API_KEY",
authDomain:"proyectnrabitcia.firebaseapp.com",
projectId:"proyectnrabitcia",
storageBucket:"proyectnrabitcia.appspot.com",
appId:"TU_APP_ID"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const storage = getStorage(app);



const email=document.getElementById("email");
const pass=document.getElementById("password");
const feed=document.getElementById("feed");
const estado=document.getElementById("estado");



document.getElementById("register").onclick=async()=>{

try{

await createUserWithEmailAndPassword(auth,email.value,pass.value);

alert("usuario creado");

}catch(e){

alert(e.message);

}

};



document.getElementById("login").onclick=async()=>{

try{

await signInWithEmailAndPassword(auth,email.value,pass.value);

}catch(e){

alert(e.message);

}

};



document.getElementById("logout").onclick=()=>{

signOut(auth);

};



onAuthStateChanged(auth,user=>{

if(user){

document.getElementById("auth").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

document.getElementById("user").innerText=user.email;

cargarFeed();

}else{

document.getElementById("auth").classList.remove("hidden");
document.getElementById("app").classList.add("hidden");

}

});



document.getElementById("subir").onclick=async()=>{

const file=document.getElementById("imagen").files[0];
const texto=document.getElementById("texto").value;

if(!file){
alert("elige imagen");
return;
}

estado.innerText="subiendo imagen...";

try{

const ruta="fotos/"+Date.now()+"_"+file.name;

const storageRef=ref(storage,ruta);

const subida=await uploadBytes(storageRef,file);

const url=await getDownloadURL(subida.ref);

console.log("URL imagen:",url);


await addDoc(collection(db,"posts"),{

imageUrl:url,
descripcion:texto,
autor:auth.currentUser.email,
creado:Timestamp.now()

});


estado.innerText="publicado";

document.getElementById("imagen").value="";
document.getElementById("texto").value="";

cargarFeed();

}catch(e){

console.error(e);

estado.innerText="error subiendo";

}

};



async function cargarFeed(){

feed.innerHTML="cargando...";

const q=query(collection(db,"posts"),orderBy("creado","desc"));

const snap=await getDocs(q);

feed.innerHTML="";

snap.forEach(doc=>{

const d=doc.data();

const html=`

<div class="post">

<img src="${d.imageUrl}" loading="lazy">

<p>${d.descripcion || ""}</p>

<small>${d.autor}</small>

</div>

`;

feed.insertAdjacentHTML("beforeend",html);

});

}

</script>

</body>
</html>
