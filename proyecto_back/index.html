<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Fotos Comunitario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-section">
        <div class="card">
            <h2>Acceso al Sistema</h2>
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            <div class="auth-buttons">
                <button id="btn-login">Entrar</button>
                <button id="btn-register" class="btn-secondary">Crear Cuenta</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <header class="main-header">
            <span>Conectado como: <b id="user-display"></b></span>
            <button id="btn-logout" class="btn-danger">Cerrar Sesión</button>
        </header>

        <div class="upload-container">
            <h3>Nueva Publicación</h3>
            <input type="text" id="photo-text" placeholder="Escribe un pie de foto...">
            <input type="file" id="photo-file" accept="image/*">
            <button id="btn-upload">Publicar Foto</button>
            <div id="upload-status"></div>
        </div>

        <div id="feed">
            <p class="loading">Cargando publicaciones...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
        import { getFirestore, collection, addDoc, query, getDocs, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // CONFIGURACIÓN DE TU PROYECTO
        const firebaseConfig = {
            apiKey: "AIzaSyBFxiuq5VEPIE_XF6o1r_5B3M3TVID4ADM",
            authDomain: "proyectnrabitcia.firebaseapp.com",
            projectId: "proyectnrabitcia",
            storageBucket: "proyectnrabitcia.firebasestorage.app", // Verificado: corregido a .firebasestorage.app
            messagingSenderId: "1027517841438",
            appId: "1:1027517841438:web:e38d64106c2e79b390ee0f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const db = getFirestore(app);

        // --- GESTIÓN DE USUARIOS ---
        
        document.getElementById("btn-register").onclick = () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            if(!email || !pass) return alert("Completa los datos");
            createUserWithEmailAndPassword(auth, email, pass)
                .then(() => alert("¡Cuenta creada!"))
                .catch(e => alert("Error: " + e.message));
        };

        document.getElementById("btn-login").onclick = () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            signInWithEmailAndPassword(auth, email, pass)
                .catch(e => alert("Error de acceso: " + e.message));
        };

        document.getElementById("btn-logout").onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            const authDiv = document.getElementById("auth-section");
            const appDiv = document.getElementById("app-section");
            if (user) {
                authDiv.classList.add("hidden");
                appDiv.classList.remove("hidden");
                document.getElementById("user-display").innerText = user.email;
                cargarFeed();
            } else {
                authDiv.classList.remove("hidden");
                appDiv.classList.add("hidden");
            }
        });

        // --- GESTIÓN DE SUBIDAS Y FEED ---

        document.getElementById("btn-upload").onclick = async () => {
            const fileInput = document.getElementById("photo-file");
            const textInput = document.getElementById("photo-text");
            const status = document.getElementById("upload-status");
            
            if (!fileInput.files[0]) return alert("Selecciona un archivo");

            try {
                status.innerText = "Subiendo archivo...";
                document.getElementById("btn-upload").disabled = true;

                // 1. Subir imagen a Storage
                const fileName = `fotos/${Date.now()}_${auth.currentUser.uid}`;
                const storageRef = ref(storage, fileName);
                
                const snapshot = await uploadBytes(storageRef, fileInput.files[0]);
                const url = await getDownloadURL(snapshot.ref);

                // 2. Calcular expiración (10 días exactos)
                const expira = new Date();
                expira.setDate(expira.getDate() + 10);

                // 3. Guardar metadatos en Firestore
                await addDoc(collection(db, "posts"), {
                    imageUrl: url,
                    descripcion: textInput.value || "",
                    autor: auth.currentUser.email,
                    creado: Timestamp.now(),
                    expira: Timestamp.fromDate(expira)
                });

                status.innerText = "¡Publicado!";
                textInput.value = "";
                fileInput.value = "";
                cargarFeed();
            } catch (error) {
                console.error(error);
                alert("Error al publicar: " + error.code);
            } finally {
                document.getElementById("btn-upload").disabled = false;
            }
        };

        async function cargarFeed() {
            const feed = document.getElementById("feed");
            feed.innerHTML = "<p>Cargando fotos de la comunidad...</p>";
            const ahora = new Date();

            try {
                const q = query(collection(db, "posts"), orderBy("creado", "desc"));
                const querySnapshot = await getDocs(q);
                
                feed.innerHTML = "";
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    const fechaExpira = data.expira.toDate();

                    // Lógica de 10 días: solo mostrar si no ha expirado
                    if (ahora < fechaExpira) {
                        const postHtml = `
                            <div class="post-card">
                                <div class="post-header">
                                    <strong>${data.autor}</strong>
                                </div>
                                <img src="${data.imageUrl}" alt="Foto compartida">
                                <div class="post-body">
                                    <p>${data.descripcion}</p>
                                    <small>Publicado: ${data.creado.toDate().toLocaleDateString()}</small>
                                    <br>
                                    <small class="expira">Expira: ${fechaExpira.toLocaleDateString()}</small>
                                </div>
                            </div>`;
                        feed.innerHTML += postHtml;
                    }
                });
            } catch (e) {
                feed.innerHTML = "<p>Error al cargar el feed. Revisa las reglas de Firestore.</p>";
            }
        }
    </script>
</body>
</html>
