<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muro Comunitario</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="auth-section">
  <div class="card">
    <h2>Acceso</h2>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btn-login">Entrar</button>
    <button id="btn-register">Crear Cuenta</button>
  </div>
</div>

<div id="app-section" class="hidden">
  <header>
    <span>Usuario: <b id="user-display"></b></span>
    <button id="btn-logout">Salir</button>
  </header>

  <div class="upload-container">
    <h3>Nueva Foto</h3>
    <input type="text" id="photo-text" placeholder="Descripción">
    <input type="file" id="photo-file" accept="image/*">
    <button id="btn-upload">Publicar</button>
    <div id="upload-status"></div>
  </div>

  <div id="feed"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getFirestore, collection, addDoc, query, orderBy, Timestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Configuración Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBFxiuq5VEPIE_XF6o1r_5B3M3TVID4ADM",
  authDomain: "proyectnrabitcia.firebaseapp.com",
  projectId: "proyectnrabitcia",
  storageBucket: "proyectnrabitcia.firebasestorage.app",
  messagingSenderId: "1027517841438",
  appId: "1:1027517841438:web:e38d64106c2e79b390ee0f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const storage = getStorage(app);
const db = getFirestore(app);

const emailInput = document.getElementById("email");
const passInput = document.getElementById("password");
const feed = document.getElementById("feed");

// Registro
document.getElementById("btn-register").onclick = async () => {
  try {
    await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value);
    alert("Cuenta creada");
  } catch(e) { alert(e.message); }
};

// Login
document.getElementById("btn-login").onclick = async () => {
  try { await signInWithEmailAndPassword(auth, emailInput.value, passInput.value); }
  catch(e){ alert(e.message); }
};

// Logout
document.getElementById("btn-logout").onclick = () => signOut(auth);

// Estado de usuario
onAuthStateChanged(auth, user => {
  const authDiv = document.getElementById("auth-section");
  const appDiv = document.getElementById("app-section");

  if(user){
    authDiv.classList.add("hidden");
    appDiv.classList.remove("hidden");
    document.getElementById("user-display").innerText = user.email;
    escucharFeed();
  } else {
    authDiv.classList.remove("hidden");
    appDiv.classList.add("hidden");
  }
});

// Subir foto
document.getElementById("btn-upload").onclick = async () => {
  const file = document.getElementById("photo-file").files[0];
  const text = document.getElementById("photo-text").value;
  const status = document.getElementById("upload-status");

  if(!file){ alert("Selecciona una imagen"); return; }

  try{
    status.innerText = "Subiendo...";
    const nombre = `fotos/${Date.now()}_${auth.currentUser.uid}`;
    const storageRef = ref(storage, nombre);
    const snap = await uploadBytes(storageRef, file);
    const url = await getDownloadURL(snap.ref);

    const expira = new Date();
    expira.setDate(expira.getDate() + 10);

    await addDoc(collection(db,"posts"), {
      imageUrl: url,
      descripcion: text,
      autor: auth.currentUser.email,
      creado: Timestamp.now(),
      expira: Timestamp.fromDate(expira)
    });

    status.innerText = "Publicado";
    document.getElementById("photo-file").value = "";
    document.getElementById("photo-text").value = "";

  } catch(e){ alert(e.message); }
};

// Escuchar feed y filtrar expiradas
function escucharFeed(){
  const ahora = new Date();
  const q = query(collection(db,"posts"), orderBy("creado","desc"));

  onSnapshot(q, snapshot => {
    feed.innerHTML = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      if(!data.imageUrl) return;

        const card = document.createElement("div");
        card.className = "post-card";
        card.innerHTML = `
          <div class="post-header"><strong>${data.autor}</strong></div>
          <img src="${data.imageUrl}" loading="lazy" crossorigin="anonymous">
          <div class="post-body">
            <p>${data.descripcion || ""}</p>
            <small>Publicado: ${data.creado.toDate().toLocaleDateString()}</small><br>
            <small>Expira: ${fechaExpira.toLocaleDateString()}</small>
          </div>
        `;
        feed.appendChild(card);
      }
    });
  });
}

</script>

</body>
</html>
